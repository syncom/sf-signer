name: "Sanity Checks"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  sanity-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          # Fetch all history for all tags and branches
          fetch-depth: 0
      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.5'
          enable-stack: true
          stack-version: '2.15.7'
      - name: Install dependencies
        run: |
          stack --version
          if [ ${{ matrix.os }} = 'ubuntu-latest' ]; then
            sudo apt-get update
            sudo apt-get install -y faketime
          fi
          if [ ${{ matrix.os }} = 'macos-latest' ]; then
            # for `sha256sum`
            brew install coreutils
            brew install libfaketime
          fi
      - name: Build
        run: |
          cd ${{ github.workspace }}
          # Linking statically for Linux, dynamically otherwise
          if [ ${{ matrix.os }} = 'ubuntu-latest' ]; then
            make static-build
          else
            make build
          fi
          file build/sfsigner
      - name: Unit test
        run: |
          make test
      - name: Integration test
        run: |
          ./script/sign-and-verify.sh
